<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <title>TICet</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <img src="img/tic-logo.svg" alt="Logo TIC" />
      <h1>TICet</h1>
    </header>
    <div class="bandContainer"></div>
    <section class="priceContainer">
      <div class="price">
        <h2 id="tituloCompra">Valor entrada</h2>
        <div class="formCompra">
          <label>Cantidad <input type="number" id="cantidad" min="1" disabled /></label>
          <label>Descuento <input type="text" id="descuento" disabled /></label>
          <button id="comprar" disabled>Comprar</button>
        </div>
      </div>
    </section>

    <dialog id="dialogo">
      <p id="mensajePrecio"></p>
      <button id="okBtn">Ok</button>
    </dialog>
    <script src="websocket.js"></script>
    <script defer src="main.js"></script>
  </body>
</html>
